model:
  n_embd: 32
  n_head: 4
  n_kv_head: 2
  n_layer: 2
  max_seq_len: 64
  vocab_size: 256
  grad_checkpoint: false

train:
  batch_size: 4
  grad_accum_steps: 2
  block_size: 32
  max_iters: 50
  learning_rate: 1.0e-3
  warmup_iters: 5
  min_lr: 1.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  eval_interval: 10
  eval_iters: 5
  checkpoint_interval: 25
  optimizer: adamw

data:
  train_shards_glob: "tests/fixtures/toy_train_*.bin"
  val_shards_glob: "tests/fixtures/toy_val_*.bin"
  seed: 0

log:
  project: cognitive-kernel
  run_name: toy_test
  log_interval: 5
  wandb_mode: disabled
