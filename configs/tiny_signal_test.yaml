model:
  n_embd: 256
  n_head: 8
  n_kv_head: 2
  n_layer: 4
  max_seq_len: 512
  vocab_size: 32000
  grad_checkpoint: false

train:
  batch_size: 8
  grad_accum_steps: 4
  block_size: 512
  max_iters: 2000
  learning_rate: 1.0e-3
  warmup_iters: 100
  min_lr: 1.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 200
  eval_iters: 10
  checkpoint_interval: 500
  optimizer: adamw

data:
  train_shards_glob: "/content/drive/MyDrive/cognitive-kernel/data/shards/train_*.bin"
  val_shards_glob:   "/content/drive/MyDrive/cognitive-kernel/data/shards/val_*.bin"
  seed: 42

log:
  project: cognitive-kernel
  run_name: phase_1a_signal_test
  log_interval: 50
  wandb_mode: offline
