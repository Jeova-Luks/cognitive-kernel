model:
  n_embd: 768
  n_head: 12
  n_kv_head: 4
  n_layer: 12
  max_seq_len: 2048
  vocab_size: 32000
  grad_checkpoint: true

train:
  batch_size: 16
  grad_accum_steps: 16     # effective batch = 256
  block_size: 2048
  max_iters: 20000
  learning_rate: 3.0e-4
  warmup_iters: 200
  min_lr: 3.0e-5
  weight_decay: 0.1
  grad_clip: 1.0
  eval_interval: 500
  eval_iters: 50
  checkpoint_interval: 500
  optimizer: adamw_8bit

data:
  train_shards_glob: "data/shards/train_*.bin"
  val_shards_glob: "data/shards/val_*.bin"
  seed: 42

log:
  project: cognitive-kernel
  run_name: base_100m
  log_interval: 10
  wandb_mode: online
